services:
  - type: web
    name: expense-tracker-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python backend/api.py"
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        sync: false
